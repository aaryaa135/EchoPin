version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: echopin_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: echopin

      POSTGRES_USER: echopin

      POSTGRES_PASSWORD: echopin123

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echopin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4

    container_name: echopin_pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@echopin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data: